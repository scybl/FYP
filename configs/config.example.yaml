# Example config for checking the project structure without local machine assumptions.
device: "cpu"
model:
  save_path: "params/"
  pretrained_encoder: false

save_pic: false
save_image_path: "saved_images"

data_loader:
  batch_size: 2
  shuffle: true
  num_workers: 0

setting:
  epochs: 1
  seed: 42
  max_lr: 0.001
  power: 0.9
  min_lr: 0.00001
  warmup_epochs: 1

datasets:
  isic2018:
    size: 224
    class_num: 1
    in_channel: 3
    dataset_path: "LoadData"
    img_prefix: "ISIC_"
    seg_prefix: "ISIC_"
    img_suffix: ".jpg"
    seg_suffix: "_segmentation.png"
    train_img: "isic2018/train/img"
    train_mask: "isic2018/train/mask"
    val_img: "isic2018/val/img"
    val_mask: "isic2018/val/mask"
    test_img: "isic2018/test/img"
    test_mask: "isic2018/test/mask"
    augmentations:
      geometric_transforms:
        - type: "Resize"
          params:
            size: [224, 224]
      color_transforms: []

  kvasir:
    size: 224
    class_num: 1
    in_channel: 3
    dataset_path: "LoadData"
    train_img: "Kvasir-SEG/train/img"
    train_mask: "Kvasir-SEG/train/mask"
    val_img: "Kvasir-SEG/val/img"
    val_mask: "Kvasir-SEG/val/mask"
    test_img: "Kvasir-SEG/test/img"
    test_mask: "Kvasir-SEG/test/mask"
    augmentations:
      geometric_transforms:
        - type: "Resize"
          params:
            size: [224, 224]
      color_transforms: []

  clinicdb:
    size: 224
    class_num: 1
    in_channel: 3
    dataset_path: "LoadData"
    train_img: "CVC-ClinicDB/train/img"
    train_mask: "CVC-ClinicDB/train/mask"
    val_img: "CVC-ClinicDB/val/img"
    val_mask: "CVC-ClinicDB/val/mask"
    test_img: "CVC-ClinicDB/test/img"
    test_mask: "CVC-ClinicDB/test/mask"
    augmentations:
      geometric_transforms:
        - type: "Resize"
          params:
            size: [224, 224]
      color_transforms: []

  synapse:
    size: 224
    class_num: 9
    in_channel: 1
    root_path: "LoadData/Synapse/train_npz"
    list_dir: "LoadData/Synapse/lists_Synapse"
    augmentations:
      geometric_transforms:
        - type: "Resize"
          params:
            size: [224, 224]
      color_transforms: []
